name: Deploy WP Theme to XREA

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry-run モード（実際には転送しない）'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    env:
      SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
      SSH_HOST: ${{ secrets.SERVER_HOST }}
      SSH_PORT: ${{ secrets.SERVER_PORT }}
      SSH_USER: ${{ secrets.SERVER_USER }}
      DEPLOY_DIR: ${{ secrets.SERVER_DIR }}
      XREA_API_SECRET_KEY: ${{ secrets.XREA_API_SECRET_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$SSH_PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Allow SSH IP via XREA API
        run: |
          # Get current runner's global IP
          CURRENT_IP=$(curl -s https://ifconfig.me)
          echo "Current Runner IP: $CURRENT_IP"

          # Allow IP via XREA API (Form data format)
          RESPONSE=$(curl -sS -X POST \
            -d "account=$SSH_USER" \
            -d "server_name=$SSH_HOST" \
            -d "api_secret_key=$XREA_API_SECRET_KEY" \
            -d "param[addr]=$CURRENT_IP" \
            https://api.xrea.com/v1/tool/ssh_ip_allow)
          
          echo "API Response: $RESPONSE"
          
          # Check for success status code
          if [[ $RESPONSE != *"status_code\":200"* ]]; then
            echo "Error: XREA API did not return success."
            exit 1
          fi

          echo "Waiting 15 seconds for propagation..."
          sleep 15

      - name: Deploy via rsync
        run: |
          DRY_RUN_FLAG=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.dry_run }}" = "true" ]; then
            DRY_RUN_FLAG="--dry-run"
            echo "🧪 Dry-run モード: 転送はシミュレーションのみです"
          fi

          rsync -avz --delete $DRY_RUN_FLAG \
            --exclude '.git' \
            --exclude '.github' \
            -e "ssh -i ~/.ssh/deploy_key -p $SSH_PORT -o StrictHostKeyChecking=no" \
            ./ \
            "${SSH_USER}@${SSH_HOST}:${DEPLOY_DIR}/"

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/deploy_key
