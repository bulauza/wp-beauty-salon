name: Deploy WP Theme to XREA

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry-run モード（実際には転送しない）'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    env:
      SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
      SSH_HOST: ${{ secrets.SERVER_HOST }}
      SSH_PORT: ${{ secrets.SERVER_PORT }}
      SSH_USER: ${{ secrets.SERVER_USER }}
      DEPLOY_DIR: ${{ secrets.SERVER_DIR }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$SSH_PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy via rsync
        run: |
          DRY_RUN_FLAG=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.dry_run }}" = "true" ]; then
            DRY_RUN_FLAG="--dry-run"
            echo "🧪 Dry-run モード: 転送はシミュレーションのみです"
          fi

          rsync -avz --delete $DRY_RUN_FLAG \
            --exclude '.git' \
            --exclude '.github' \
            -e "ssh -i ~/.ssh/deploy_key -p $SSH_PORT -o StrictHostKeyChecking=no" \
            ./ \
            "${SSH_USER}@${SSH_HOST}:${DEPLOY_DIR}/"

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/deploy_key
